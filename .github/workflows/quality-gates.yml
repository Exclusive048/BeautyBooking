name: Quality Gates

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Types, Prisma, Encoding
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/beautyhub?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/beautyhub?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test -- --reporter=verbose

      - name: Mojibake check
        run: npm run check:mojibake

      - name: Encoding check
        run: npm run check:encoding
