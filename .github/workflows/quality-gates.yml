name: Quality Gates

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Types, Tests, Prisma, Encoding
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/beautyhub?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/beautyhub?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test -- --reporter=verbose --bail 1
        env:
          NODE_ENV: test
          AUTH_JWT_SECRET: test-jwt-secret-for-ci-must-be-at-least-64-characters-long-xxxxxxxxxxxxxxx
          OTP_HMAC_SECRET: test-otp-secret-for-ci-at-least-32chars
          DATABASE_URL: ""
          REDIS_URL: ""

      - name: Mojibake check
        run: npm run check:mojibake

      - name: Encoding check
        run: npm run check:encoding
